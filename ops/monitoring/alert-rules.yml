groups:
  - name: asdev-audit-ir-alerts
    rules:
      - alert: HighApi5xxRate
        expr: sum(rate(audit_api_requests_total{status=~"5.."}[5m])) > 1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx rate on asdev-audit-ir"
          description: "API 5xx rate stayed above 1 req/s for 10m."

      - alert: ElevatedApiLatencyP95
        expr: histogram_quantile(0.95, sum by (le, route) (rate(audit_api_duration_bucket[5m]))) > 1500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High API p95 latency"
          description: "p95 latency above 1500ms for 10m."

      - alert: ZeroTraffic
        expr: sum(rate(audit_api_requests_total[15m])) == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "No traffic observed"
          description: "No API traffic for 30m. Verify ingestion and app health."
