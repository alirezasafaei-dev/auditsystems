name: roadmap-automation

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  roadmap:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run roadmap automation (strict)
        run: pnpm run roadmap:run

      - name: Upload roadmap reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roadmap-reports
          path: logs/roadmap/
