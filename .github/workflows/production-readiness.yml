name: production-readiness

on:
  workflow_dispatch:
  schedule:
    - cron: "45 4 * * *"

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Install CI toolchain (ripgrep)
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Quality + Roadmap + Docs + Payment preflight
        env:
          APP_BASE_URL: "https://audit.alirezasafaeisystems.ir"
          DOWNLOAD_TOKEN_SECRET: "ci-readiness-download-token-secret-2026"
          PAYMENT_PROVIDER_DEFAULT: "MOCK"
          ZARINPAL_MERCHANT_ID: ${{ secrets.ZARINPAL_MERCHANT_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          REQUIRE_DISTRIBUTED_RATE_LIMIT: "false"
        run: |
          pnpm prisma generate
          pnpm run check
          pnpm run roadmap:run
          pnpm run docs:generate
          pnpm run payment:preflight:strict

      - name: Zarinpal smoke test (if merchant configured)
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          ZARINPAL_MERCHANT_ID: ${{ secrets.ZARINPAL_MERCHANT_ID }}
        run: |
          if [ -n "${ZARINPAL_MERCHANT_ID}" ]; then
            pnpm run payment:zarinpal:smoke
          else
            echo "ZARINPAL_MERCHANT_ID is not set; skipping zarinpal smoke test."
          fi

      - name: ASDEV network baseline (live GET/HEAD + locale)
        env:
          NO_PROXY: "*"
        run: pnpm run network:baseline

      - name: Hosting sync check (non-SSH, non-blocking network-aware)
        run: |
          mkdir -p logs/deploy
          bash scripts/deploy/check-hosting-sync.sh | tee logs/deploy/ci-hosting-sync.log

      - name: Upload readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-readiness-reports
          path: |
            logs/roadmap/
            logs/preflight/
            logs/runtime/
            logs/deploy/
            docs/AUTO_GENERATED_STATUS.md
